name: "Packaging / build problem"
description: "A .skill package or the deterministic builder produces a wrong, corrupt, or non-reproducible result."
title: "[packaging] "
labels: ["comp:packaging", "type:bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What went wrong?
      description: "e.g. a .skill won't upload, a fresh build doesn't match the committed dist, an entry is missing."
    validations:
      required: true
  - type: textarea
    id: builder_output
    attributes:
      label: Builder output
      description: "Output of `python3 scripts/package_core.py` and the following `git status --short`."
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: "OS, Python version, and zlib implementation (`python3 -c 'import zlib;print(zlib.ZLIB_VERSION)'`)."
      placeholder: "Linux; Python 3.12; zlib 1.3.1.zlib-ng"
    validations:
      required: true
