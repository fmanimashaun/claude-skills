# Label taxonomy for issue triage (source of truth). skill-maintainer's
# /skill-maintainer:setup-intake creates these idempotently. name → color → description.

# Component (exactly one per issue) — which artifact owns the problem
- name: "comp:rails-8"
  color: "1f6feb"
  description: "rails-8 skill (references/doctrine)"
- name: "comp:hotwire"
  color: "1f6feb"
  description: "hotwire skill (Turbo/Stimulus/Native)"
- name: "comp:rails-flow"
  color: "1f6feb"
  description: "rails-flow plugin (commands/agents/hooks)"
- name: "comp:qa-flow"
  color: "1f6feb"
  description: "qa-flow plugin"
- name: "comp:pipeline"
  color: "1f6feb"
  description: "pipeline plugin"
- name: "comp:packaging"
  color: "1f6feb"
  description: "dist/*.skill build / package_core.py"
- name: "comp:marketplace"
  color: "1f6feb"
  description: "marketplace.json / registry / versions"

# Type (exactly one per issue)
- name: "type:incorrect-doctrine"
  color: "b60205"
  description: "A skill states something false/outdated — highest scrutiny"
- name: "type:skill-gap"
  color: "d93f0b"
  description: "Missing skill coverage"
- name: "type:bug"
  color: "d73a4a"
  description: "A plugin command/agent/hook misbehaves"
- name: "type:feature"
  color: "0e8a16"
  description: "New capability request"
- name: "type:chore"
  color: "fef2c0"
  description: "Docs / packaging / housekeeping"

# Priority (exactly one per issue)
- name: "prio:P1"
  color: "b60205"
  description: "Wrong doctrine agents act on, broken safety gate, corrupt packaging"
- name: "prio:P2"
  color: "d93f0b"
  description: "Real defect with a workaround"
- name: "prio:P3"
  color: "fbca04"
  description: "Minor / cosmetic / nice-to-have"

# Status
- name: "needs-info"
  color: "cccccc"
  description: "Not enough detail to act — awaiting reporter"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already tracked by another issue"
